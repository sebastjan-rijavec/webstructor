<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Webstructor</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app">
      <aside id="sidebar">
        <header class="sidebar-header">
          <h1>Webstructor</h1>
          <p class="subtitle">Library</p>
        </header>
        <div id="library-list" class="library-list"></div>
      </aside>

      <main id="viewport-wrap">
        <div id="toolbar">
          <div class="toolbar-group">
            <button data-action="undo" title="Undo (Ctrl+Z)">Undo</button>
            <button data-action="redo" title="Redo (Ctrl+Shift+Z)">Redo</button>
          </div>
          <div class="toolbar-group">
            <button data-action="translate" title="Translate (W)" class="mode-btn active">Move</button>
            <button data-action="rotate" title="Rotate (E)" class="mode-btn">Rotate</button>
            <button data-action="scale" title="Scale (R)" class="mode-btn">Scale</button>
          </div>
          <div class="toolbar-group">
            <label class="toggle">
              <input type="checkbox" id="snap-toggle" />
              <span>Snap</span>
            </label>
          </div>
          <div class="toolbar-group">
            <button data-action="duplicate" title="Duplicate (Ctrl+D)">Duplicate</button>
            <button data-action="group" title="Group (Ctrl+G)">Group</button>
            <button data-action="delete" title="Delete (Del)">Delete</button>
            <button data-action="frame" title="Frame Selected (F)">Frame</button>
          </div>
          <div class="toolbar-group">
            <button data-view="perspective" class="view-btn active" title="Perspective">3D</button>
            <button data-view="front" class="view-btn" title="Front (-Z)">Front</button>
            <button data-view="back" class="view-btn" title="Back (+Z)">Back</button>
            <button data-view="left" class="view-btn" title="Left (-X)">Left</button>
            <button data-view="right" class="view-btn" title="Right (+X)">Right</button>
            <button data-view="top" class="view-btn" title="Top (-Y)">Top</button>
            <button data-view="bottom" class="view-btn" title="Bottom (+Y)">Bot</button>
          </div>
          <div class="toolbar-group right">
            <button data-action="export" class="primary" title="Export as GLB">Export GLB</button>
          </div>
        </div>
        <div id="toolbar2" class="toolbar">
          <div class="toolbar-group">
            <span class="toolbar-label">FOV</span>
            <button data-fov="10" class="fov-btn" title="10°">10°</button>
            <button data-fov="25" class="fov-btn" title="25°">25°</button>
            <button data-fov="40" class="fov-btn" title="40°">40°</button>
            <button data-fov="50" class="fov-btn active" title="50°">50°</button>
            <button data-fov="75" class="fov-btn" title="75°">75°</button>
            <button data-fov="100" class="fov-btn" title="100°">100°</button>
          </div>
        </div>
        <canvas id="viewport"></canvas>
        <div id="hint">Click a library item to add it. Click an object to select. W/E/R: move/rotate/scale. Hold Shift for snap.</div>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
